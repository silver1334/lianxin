# Development Docker Compose Configuration
# Use this for local development with hot reloading and debugging

version: "3.8"

services:
  # MySQL Database (same as production)
  mysql:
    image: mysql:8.0
    container_name: lianxin-mysql-dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_dev_data:/var/lib/mysql
      - ./services/user-service/db/migrations:/docker-entrypoint-initdb.d:ro
    networks:
      - lianxin-dev-network
    command: --default-authentication-plugin=mysql_native_password

  # Redis Cache (same as production)
  redis:
    image: redis:7-alpine
    container_name: lianxin-redis-dev
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    networks:
      - lianxin-dev-network

  # API Gateway (Development mode with nodemon)
  gateway:
    build:
      context: .
      dockerfile: gateway/Dockerfile.dev
    container_name: lianxin-gateway-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - USER_SERVICE_URL=http://user-service:3001
      - LOG_LEVEL=debug
    volumes:
      - ./gateway/src:/app/src:ro
      - ./shared:/app/shared:ro
      - /app/node_modules
    depends_on:
      - user-service
    networks:
      - lianxin-dev-network

  # User Service (Development mode with nodemon)
  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile.dev
    container_name: lianxin-user-service-dev
    restart: unless-stopped
    ports:
      - "3001:3001"
      - "9229:9229" # Node.js debugging port
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DB_HOST=mysql
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_ACCESS_TOKEN_SECRET=${JWT_ACCESS_TOKEN_SECRET:-dev-jwt-access-secret}
      - JWT_REFRESH_TOKEN_SECRET=${JWT_REFRESH_TOKEN_SECRET:-dev-jwt-refresh-secret}
      - ENCRYPTION_PRIMARY_KEY=${ENCRYPTION_PRIMARY_KEY:-dev-encryption-key-32-characters}
      - ENCRYPTION_SECONDARY_KEY=${ENCRYPTION_SECONDARY_KEY:-dev-secondary-key-32-characters}
      - LOG_LEVEL=debug
      - ENABLE_DEBUG_MODE=true
    volumes:
      - ./services/user-service/src:/app/src:ro
      - ./shared:/app/shared:ro
      - ./services/user-service/logs:/app/logs
      - /app/node_modules
    depends_on:
      - mysql
      - redis
    networks:
      - lianxin-dev-network

  # Database Administration
  adminer:
    image: adminer:4.8.1
    container_name: lianxin-adminer-dev
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mysql
      ADMINER_DESIGN: pepa-linha
    depends_on:
      - mysql
    networks:
      - lianxin-dev-network

  # Redis Commander
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: lianxin-redis-commander-dev
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      REDIS_HOSTS: local:redis:6379:0:${REDIS_PASSWORD:-redis123}
      HTTP_USER: admin
      HTTP_PASSWORD: admin123
    depends_on:
      - redis
    networks:
      - lianxin-dev-network

volumes:
  mysql_dev_data:
    driver: local
  redis_dev_data:
    driver: local

networks:
  lianxin-dev-network:
    driver: bridge
